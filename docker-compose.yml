services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: drop
    ports:
      - "5432:5432"
    volumes:
      - drop-postgres-data:/var/lib/postgresql/data
      - ./deploy/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 15
    networks:
      - dropwell-net

  app:
    build: .
    env_file:
      - .env
    environment:
      DROPWELL_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/drop
    ports:
      - "127.0.0.1:9731:9731"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dropwell-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9731/health')"]
      interval: 2s
      timeout: 2s
      retries: 15

networks:
  dropwell-net:

volumes:
  drop-postgres-data:
